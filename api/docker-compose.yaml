name: legal-calendar

services:

  postgres-legal-calendar:
    image: postgres:16-alpine
    container_name: legal_calendar_postgres
    restart: unless-stopped
    ports:
      - "5439:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: legal_calendar
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres_legal_calendar_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d legal_calendar"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  redis-legal-calendar:
    image: redis:7-alpine
    container_name: legal_calendar_redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_legal_calendar_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_legal_calendar_data:
  redis_legal_calendar_data:
